global
    maxconn 4096
    nbthread 1

defaults
    mode tcp
    timeout connect 100ms
    timeout client 5s
    timeout server 5s
    option dontlognull

frontend rinha_front
    bind *:9999
    default_backend rinha_apis

backend rinha_apis
    balance roundrobin
    option tcp-check
    server api1 /sockets/api1.sock check inter 1000ms rise 1 fall 2
    server api2 /sockets/api2.sock check inter 1000ms rise 1 fall 2
