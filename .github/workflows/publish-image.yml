name: Publish image

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-image.yml
      - Cargo.lock
      - Cargo.toml
      - Dockerfile
      - docker/**
      - resources/**
      - src/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download references
        run: |
          mkdir -p resources
          curl -L -o resources/references.json.gz \
            https://raw.githubusercontent.com/zanfranceschi/rinha-de-backend-2026/main/resources/references.json.gz

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rinha-2026-rust:latest
            ghcr.io/${{ github.repository_owner }}/rinha-2026-rust:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
