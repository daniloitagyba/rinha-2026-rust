services:
  lb:
    image: haproxy:2.9-alpine
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "32MB"

  api1:
    image: ghcr.io/daniloitagyba/rinha-2026-rust:latest
    platform: linux/amd64
    build: .
    environment:
      BIND_ADDR: 0.0.0.0:8080
      INDEX_PATH: /app/data/references.idx
      PREFETCH_INDEX: "true"
      WORKERS: "1"
      KEEP_ALIVE_REQUESTS: "1"
      EARLY_CANDIDATES: "16200"
      MIN_CANDIDATES: "16200"
      MAX_CANDIDATES: "32400"
      PROFILE_FASTPATH: "1"
      PROFILE_MIN_COUNT: "20"
      EXACT_FALLBACK: "risky"
      FAST_PATH: "false"
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: "156MB"

  api2:
    image: ghcr.io/daniloitagyba/rinha-2026-rust:latest
    platform: linux/amd64
    build: .
    environment:
      BIND_ADDR: 0.0.0.0:8080
      INDEX_PATH: /app/data/references.idx
      PREFETCH_INDEX: "true"
      WORKERS: "1"
      KEEP_ALIVE_REQUESTS: "1"
      EARLY_CANDIDATES: "16200"
      MIN_CANDIDATES: "16200"
      MAX_CANDIDATES: "32400"
      PROFILE_FASTPATH: "1"
      PROFILE_MIN_COUNT: "20"
      EXACT_FALLBACK: "risky"
      FAST_PATH: "false"
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: "156MB"
